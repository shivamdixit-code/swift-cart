services:
  - type: web
    name: swiftcart-api
    runtime: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: ADMIN_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        value: admin@swiftcart.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
